<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Jacket style sakura">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2436"/>
      <stop offset="50%" stop-color="#141c2c"/>
      <stop offset="100%" stop-color="#2a2034"/>
    </linearGradient>
    <radialGradient id="blush" cx="26%" cy="78%" r="52%">
      <stop offset="0%" stop-color="rgba(255,182,193,0.28)"/>
      <stop offset="45%" stop-color="rgba(255,192,203,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,182,193,0)"/>
    </radialGradient>
    <linearGradient id="petalGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#fff8fb"/>
      <stop offset="45%" stop-color="#ffd6e7"/>
      <stop offset="100%" stop-color="#f8b4c8"/>
    </linearGradient>
    <linearGradient id="petalSoft" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#fffafc"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="hanaFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7fb"/>
      <stop offset="50%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <!-- plump rounded sakura petal with soft notch (short, chubby) -->
    <path id="sakuraPetal" d="M0 2
      C7 -2 12 -8 11 -15
      C10 -20 6 -23 2 -21
      C0 -23 -2 -21 -2 -21
      C-6 -23 -10 -20 -11 -15
      C-12 -8 -7 -2 0 2Z"/>
  </defs>

  <rect width="400" height="400" fill="url(#sky)"/>
  <rect width="400" height="400" fill="url(#blush)"/>
  <rect x="0" y="0" width="14" height="400" fill="rgba(0,0,0,0.35)"/>
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="rgba(255,214,231,0.14)" stroke-width="1.2"/>

  <!-- thin branch in bottom-left -->
  <g fill="none" stroke="rgba(120,90,95,0.55)" stroke-linecap="round">
    <path d="M18 360 C48 340 70 318 96 292" stroke-width="3.2"/>
    <path d="M62 328 C78 318 92 302 104 286" stroke-width="1.8"/>
    <path d="M48 344 C58 350 74 352 90 348" stroke-width="1.5"/>
  </g>

  <!-- large chubby blossom -->
  <g transform="translate(78 300)">
    <g fill="url(#petalGrad)" opacity="0.96">
      <use href="#sakuraPetal" transform="rotate(0) scale(1.55)"/>
      <use href="#sakuraPetal" transform="rotate(72) scale(1.55)"/>
      <use href="#sakuraPetal" transform="rotate(144) scale(1.55)"/>
      <use href="#sakuraPetal" transform="rotate(216) scale(1.55)"/>
      <use href="#sakuraPetal" transform="rotate(288) scale(1.55)"/>
    </g>
    <g stroke="rgba(253,224,71,0.8)" stroke-width="0.9" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-6"/>
      <line x1="0" y1="0" x2="5.8" y2="-2"/>
      <line x1="0" y1="0" x2="3.6" y2="4.8"/>
      <line x1="0" y1="0" x2="-3.6" y2="4.8"/>
      <line x1="0" y1="0" x2="-5.8" y2="-2"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#f9a8d4"/>
    <g fill="#facc15">
      <circle cx="0" cy="-6" r="1.2"/>
      <circle cx="5.8" cy="-2" r="1.1"/>
      <circle cx="3.6" cy="4.8" r="1.1"/>
      <circle cx="-3.6" cy="4.8" r="1.1"/>
      <circle cx="-5.8" cy="-2" r="1.1"/>
    </g>
  </g>

  <!-- medium blossom -->
  <g transform="translate(136 342) rotate(16) scale(1.15)">
    <g fill="url(#petalSoft)" opacity="0.93">
      <use href="#sakuraPetal" transform="rotate(0)"/>
      <use href="#sakuraPetal" transform="rotate(72)"/>
      <use href="#sakuraPetal" transform="rotate(144)"/>
      <use href="#sakuraPetal" transform="rotate(216)"/>
      <use href="#sakuraPetal" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="2.8" fill="#f9a8d4"/>
    <g fill="#fde047" opacity="0.9">
      <circle cx="0" cy="-4.5" r="0.9"/>
      <circle cx="4.2" cy="-1.5" r="0.85"/>
      <circle cx="2.6" cy="3.6" r="0.85"/>
      <circle cx="-2.6" cy="3.6" r="0.85"/>
      <circle cx="-4.2" cy="-1.5" r="0.85"/>
    </g>
  </g>

  <!-- small blossom -->
  <g transform="translate(50 350) rotate(-20) scale(0.82)" opacity="0.92">
    <g fill="#ffe4ef">
      <use href="#sakuraPetal" transform="rotate(0)"/>
      <use href="#sakuraPetal" transform="rotate(72)"/>
      <use href="#sakuraPetal" transform="rotate(144)"/>
      <use href="#sakuraPetal" transform="rotate(216)"/>
      <use href="#sakuraPetal" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="2.2" fill="#f472b6"/>
    <circle cx="0" cy="-3.5" r="0.75" fill="#fde047"/>
    <circle cx="3.2" cy="1" r="0.7" fill="#fde047"/>
    <circle cx="-3.2" cy="1" r="0.7" fill="#fde047"/>
  </g>

  <!-- tiny blossom -->
  <g transform="translate(170 364) rotate(10) scale(0.62)" opacity="0.84">
    <g fill="#ffd6e7">
      <use href="#sakuraPetal" transform="rotate(0)"/>
      <use href="#sakuraPetal" transform="rotate(72)"/>
      <use href="#sakuraPetal" transform="rotate(144)"/>
      <use href="#sakuraPetal" transform="rotate(216)"/>
      <use href="#sakuraPetal" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="1.8" fill="#f9a8d4"/>
  </g>

  <!-- fallen plump petals -->
  <g fill="url(#petalGrad)" opacity="0.55">
    <use href="#sakuraPetal" transform="translate(40 280) rotate(-50) scale(0.72)"/>
    <use href="#sakuraPetal" transform="translate(112 314) rotate(28) scale(0.6)"/>
    <use href="#sakuraPetal" transform="translate(158 330) rotate(-16) scale(0.52)"/>
    <use href="#sakuraPetal" transform="translate(96 374) rotate(40) scale(0.58)"/>
    <use href="#sakuraPetal" transform="translate(190 354) rotate(-30) scale(0.48)"/>
  </g>

  <text x="40" y="392" fill="url(#hanaFill)" font-size="24" font-family="'Hiragino Mincho ProN','Yu Mincho',Georgia,serif" letter-spacing="0.16em">&#12399;&#12394;</text>
</svg>
