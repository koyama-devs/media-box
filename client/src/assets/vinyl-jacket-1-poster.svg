<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Jacket style summer fireworks">
  <defs>
    <linearGradient id="night" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050d18"/>
      <stop offset="40%" stop-color="#0a162c"/>
      <stop offset="100%" stop-color="#1a1238"/>
    </linearGradient>
    <radialGradient id="indigoGlow" cx="22%" cy="80%" r="55%">
      <stop offset="0%" stop-color="rgba(129,140,248,0.38)"/>
      <stop offset="45%" stop-color="rgba(167,139,250,0.16)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="38%" cy="76%" r="42%">
      <stop offset="0%" stop-color="rgba(251,146,60,0.32)"/>
      <stop offset="100%" stop-color="rgba(251,146,60,0)"/>
    </radialGradient>
    <radialGradient id="burstGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(254,243,199,0.95)"/>
      <stop offset="35%" stop-color="rgba(251,191,36,0.45)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>
    <radialGradient id="burstPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(252,231,243,0.9)"/>
      <stop offset="40%" stop-color="rgba(244,114,182,0.4)"/>
      <stop offset="100%" stop-color="rgba(244,114,182,0)"/>
    </radialGradient>
    <radialGradient id="burstViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(237,233,254,0.9)"/>
      <stop offset="40%" stop-color="rgba(167,139,250,0.42)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
    <linearGradient id="hanaFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#night)"/>
  <rect width="400" height="400" fill="url(#indigoGlow)"/>
  <rect width="400" height="400" fill="url(#warmGlow)"/>
  <rect x="0" y="0" width="14" height="400" fill="rgba(0,0,0,0.4)"/>
  <rect x="26" y="26" width="348" height="348" fill="none" stroke="rgba(196,181,253,0.14)" stroke-width="1"/>

  <!-- large gold firework — bottom-left, outside disc -->
  <g transform="translate(62 312)">
    <circle cx="0" cy="0" r="36" fill="url(#burstGold)" opacity="0.85"/>
    <g stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round" opacity="0.95">
      <line x1="0" y1="-42" x2="0" y2="-14"/>
      <line x1="30" y1="-30" x2="10" y2="-10"/>
      <line x1="42" y1="0" x2="14" y2="0"/>
      <line x1="30" y1="30" x2="10" y2="10"/>
      <line x1="0" y1="42" x2="0" y2="14"/>
      <line x1="-30" y1="30" x2="-10" y2="10"/>
      <line x1="-42" y1="0" x2="-14" y2="0"/>
      <line x1="-30" y1="-30" x2="-10" y2="-10"/>
      <line x1="16" y1="-38" x2="6" y2="-14"/>
      <line x1="38" y1="16" x2="14" y2="6"/>
      <line x1="-16" y1="38" x2="-6" y2="14"/>
      <line x1="-38" y1="-16" x2="-14" y2="-6"/>
      <line x1="38" y1="-16" x2="14" y2="-6"/>
      <line x1="16" y1="38" x2="6" y2="14"/>
      <line x1="-38" y1="16" x2="-14" y2="6"/>
      <line x1="-16" y1="-38" x2="-6" y2="-14"/>
    </g>
    <g fill="#fde68a" opacity="0.9">
      <circle cx="0" cy="0" r="4.5"/>
      <circle cx="18" cy="-22" r="2.2"/>
      <circle cx="28" cy="8" r="1.8"/>
      <circle cx="-8" cy="24" r="2"/>
      <circle cx="-26" cy="-6" r="1.7"/>
      <circle cx="8" cy="-32" r="1.4"/>
      <circle cx="32" cy="-18" r="1.3"/>
      <circle cx="-22" cy="20" r="1.5"/>
    </g>
  </g>

  <!-- vivid pink firework -->
  <g transform="translate(128 348) scale(0.78)">
    <circle cx="0" cy="0" r="30" fill="url(#burstPink)" opacity="0.8"/>
    <g stroke="#f472b6" stroke-width="1.6" stroke-linecap="round" opacity="0.92">
      <line x1="0" y1="-34" x2="0" y2="-11"/>
      <line x1="24" y1="-24" x2="8" y2="-8"/>
      <line x1="34" y1="0" x2="11" y2="0"/>
      <line x1="24" y1="24" x2="8" y2="8"/>
      <line x1="0" y1="34" x2="0" y2="11"/>
      <line x1="-24" y1="24" x2="-8" y2="8"/>
      <line x1="-34" y1="0" x2="-11" y2="0"/>
      <line x1="-24" y1="-24" x2="-8" y2="-8"/>
      <line x1="13" y1="-30" x2="5" y2="-11"/>
      <line x1="30" y1="13" x2="11" y2="5"/>
      <line x1="-13" y1="30" x2="-5" y2="11"/>
      <line x1="-30" y1="-13" x2="-11" y2="-5"/>
    </g>
    <g fill="#fbcfe8" opacity="0.95">
      <circle cx="0" cy="0" r="3.6"/>
      <circle cx="14" cy="-18" r="1.8"/>
      <circle cx="-16" cy="10" r="1.5"/>
      <circle cx="20" cy="12" r="1.4"/>
    </g>
  </g>

  <!-- violet mid burst -->
  <g transform="translate(178 366) scale(0.58)">
    <circle cx="0" cy="0" r="28" fill="url(#burstViolet)" opacity="0.75"/>
    <g stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-30" x2="0" y2="-10"/>
      <line x1="21" y1="-21" x2="7" y2="-7"/>
      <line x1="30" y1="0" x2="10" y2="0"/>
      <line x1="21" y1="21" x2="7" y2="7"/>
      <line x1="0" y1="30" x2="0" y2="10"/>
      <line x1="-21" y1="21" x2="-7" y2="7"/>
      <line x1="-30" y1="0" x2="-10" y2="0"/>
      <line x1="-21" y1="-21" x2="-7" y2="-7"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#ede9fe"/>
    <circle cx="12" cy="-14" r="1.4" fill="#ddd6fe"/>
  </g>

  <!-- smaller orange burst, higher left edge -->
  <g transform="translate(42 268) scale(0.55)" opacity="0.88">
    <circle cx="0" cy="0" r="26" fill="url(#burstGold)" opacity="0.7"/>
    <g stroke="#fb923c" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="-28" x2="0" y2="-9"/>
      <line x1="20" y1="-20" x2="7" y2="-7"/>
      <line x1="28" y1="0" x2="9" y2="0"/>
      <line x1="20" y1="20" x2="7" y2="7"/>
      <line x1="0" y1="28" x2="0" y2="9"/>
      <line x1="-20" y1="20" x2="-7" y2="7"/>
      <line x1="-28" y1="0" x2="-9" y2="0"/>
      <line x1="-20" y1="-20" x2="-7" y2="-7"/>
    </g>
    <circle cx="0" cy="0" r="2.8" fill="#fdba74"/>
    <circle cx="-12" cy="-16" r="1.3" fill="#fde68a"/>
  </g>

  <!-- tiny cyan sparkler -->
  <g transform="translate(98 372) scale(0.38)" opacity="0.8">
    <g stroke="#7dd3fc" stroke-width="1.6" stroke-linecap="round">
      <line x1="0" y1="-22" x2="0" y2="-6"/>
      <line x1="16" y1="-16" x2="5" y2="-5"/>
      <line x1="22" y1="0" x2="6" y2="0"/>
      <line x1="16" y1="16" x2="5" y2="5"/>
      <line x1="0" y1="22" x2="0" y2="6"/>
      <line x1="-16" y1="16" x2="-5" y2="5"/>
      <line x1="-22" y1="0" x2="-6" y2="0"/>
      <line x1="-16" y1="-16" x2="-5" y2="-6"/>
    </g>
    <circle cx="0" cy="0" r="2.2" fill="#e0f2fe"/>
  </g>

  <!-- another tiny warm burst near spine -->
  <g transform="translate(34 344) scale(0.32)" opacity="0.75">
    <g stroke="#f472b6" stroke-width="1.7" stroke-linecap="round">
      <line x1="0" y1="-20" x2="0" y2="-5"/>
      <line x1="14" y1="-14" x2="4" y2="-4"/>
      <line x1="20" y1="0" x2="5" y2="0"/>
      <line x1="14" y1="14" x2="4" y2="4"/>
      <line x1="0" y1="20" x2="0" y2="5"/>
      <line x1="-14" y1="14" x2="-4" y2="4"/>
      <line x1="-20" y1="0" x2="-5" y2="0"/>
      <line x1="-14" y1="-14" x2="-4" y2="-4"/>
    </g>
    <circle cx="0" cy="0" r="2" fill="#fbcfe8"/>
  </g>

  <!-- floating sparks -->
  <g fill="#fde68a" opacity="0.55">
    <circle cx="28" cy="292" r="1.6"/>
    <circle cx="88" cy="286" r="1.2"/>
    <circle cx="148" cy="320" r="1.5"/>
    <circle cx="108" cy="358" r="1.3"/>
    <circle cx="168" cy="378" r="1.4"/>
    <circle cx="52" cy="378" r="1.1"/>
    <circle cx="196" cy="358" r="1.2"/>
    <circle cx="76" cy="248" r="1.1"/>
  </g>
  <g fill="#f9a8d4" opacity="0.45">
    <circle cx="118" cy="300" r="1.3"/>
    <circle cx="160" cy="340" r="1.1"/>
    <circle cx="44" cy="320" r="1.2"/>
  </g>
  <g fill="#c4b5fd" opacity="0.42">
    <circle cx="186" cy="378" r="1.3"/>
    <circle cx="96" cy="330" r="1.1"/>
    <circle cx="68" cy="368" r="1"/>
  </g>

  <text x="40" y="392" fill="url(#hanaFill)" font-size="22" font-family="'Hiragino Mincho ProN','Yu Mincho',Georgia,serif" letter-spacing="0.16em">&#12399;&#12394;</text>
</svg>
